title: Portland City Council Monitor
description: Automated meeting summaries from Portland City Council sessions — covering housing, land use, budget, and economic development.
url: https://oakleafpdx.github.io
baseurl: /council-monitor

# Build settings
theme: null
markdown: kramdown

# Include summaries folder
include:
  - summaries

# Exclude non-site files
exclude:
  - data/
  - transcripts/
  - "*.py"
  - "*.bat"
  - requirements.txt
  - env.example
  - config.json
  - feedback.json
  - processed_videos.json
  - prompt_template.md
  - "prompt_template old.md"
  - local_transcribe.py
  - council_meeting_pipeline.py
  - run_background.bat
  - run_visible.bat
  - .gitignore
  - README.md
  - "*.docx"
