name: Council Meeting Monitor
on:
  repository_dispatch:
    types: [transcript-ready]
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL (uses captions — for full accuracy, use local script instead)'
        required: false
        type: string
permissions:
  contents: write
jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Restore processed videos ledger
        uses: actions/cache@v4
        with:
          path: processed_videos.json
          key: processed-videos-${{ github.run_id }}
          restore-keys: |
            processed-videos-
      - name: Run summarization
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EVENT_TYPE: ${{ github.event.action }}
          TRANSCRIPT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          if [ "$EVENT_TYPE" = "transcript-ready" ]; then
            echo "Processing transcript from local script..."
            python council_meeting_pipeline.py --from-dispatch
          elif [ -n "$VIDEO_URL" ]; then
            echo "Processing video with YouTube captions: $VIDEO_URL"
            python council_meeting_pipeline.py --url "$VIDEO_URL"
          else
            echo "No input provided."
          fi
      - name: Save processed videos ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-videos-ledger
          path: processed_videos.json
          retention-days: 90
          overwrite: true
