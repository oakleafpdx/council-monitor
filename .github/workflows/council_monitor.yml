name: Council Meeting Monitor

on:
  schedule:
    - cron: '0 4 * * 4'
    - cron: '0 4 * * 5'

  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL to process (leave blank to check for new videos)'
        required: false
        type: string

jobs:
  process-meeting:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore processed videos ledger
        uses: actions/cache@v4
        with:
          path: processed_videos.json
          key: processed-videos-${{ github.run_id }}
          restore-keys: |
            processed-videos-

      - name: Set up YouTube cookies
        run: |
          echo "$YOUTUBE_COOKIES_B64" | base64 -d > cookies.txt
          echo "Cookie file size: $(wc -c < cookies.txt) bytes"
          echo "Cookie file lines: $(wc -l < cookies.txt) lines"
          head -3 cookies.txt
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}

      - name: Run pipeline
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_CHANNEL_ID: UCcPIUh7CWwtBXisMPHWG65g
          YOUTUBE_COOKIES_PATH: cookies.txt
        run: |
          if [ -n "${{ github.event.inputs.video_url }}" ]; then
            echo "Processing specific video: ${{ github.event.inputs.video_url }}"
            python council_meeting_pipeline.py --url "${{ github.event.inputs.video_url }}"
          else
            echo "Checking for new videos..."
            python council_meeting_pipeline.py --check-new
          fi

      - name: Save processed videos ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-videos-ledger
          path: processed_videos.json
          retention-days: 90
          overwrite: true
