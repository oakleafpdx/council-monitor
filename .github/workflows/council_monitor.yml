name: Council Meeting Monitor

on:
  # Run automatically every Wednesday and Thursday evening (Pacific Time)
  # Council meets Wed 9:30am PT; recordings usually post same day or next day
  # Cron is in UTC: 4am UTC Thursday = 8pm PT Wednesday, 4am UTC Friday = 8pm PT Thursday
  schedule:
    - cron: '0 4 * * 4'   # Thursday 4am UTC = Wednesday 8pm PT
    - cron: '0 4 * * 5'   # Friday 4am UTC = Thursday 8pm PT

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL to process (leave blank to check for new videos)'
        required: false
        type: string

jobs:
  process-meeting:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore processed videos ledger
        # Persist the ledger between runs using a branch-based cache
        uses: actions/cache@v4
        with:
          path: processed_videos.json
          key: processed-videos-${{ github.run_id }}
          restore-keys: |
            processed-videos-

      - name: Set up YouTube cookies
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
        shell: bash

      - name: Run pipeline
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_CHANNEL_ID: UCcPIUh7CWwtBXisMPHWG65g
          YOUTUBE_COOKIES_PATH: cookies.txt
        run: |
          if [ -n "${{ github.event.inputs.video_url }}" ]; then
            echo "Processing specific video: ${{ github.event.inputs.video_url }}"
            python council_meeting_pipeline.py --url "${{ github.event.inputs.video_url }}"
          else
            echo "Checking for new videos..."
            python council_meeting_pipeline.py --check-new
          fi

      - name: Save processed videos ledger
        # Upload the ledger as an artifact so it persists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-videos-ledger
          path: processed_videos.json
          retention-days: 90
          overwrite: true
